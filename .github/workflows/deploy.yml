name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

      - name: Run Ruff
        run: python -m ruff check .

      - name: Check formatting
        run: python -m ruff format --check .

      - name: Run mypy
        run: python -m mypy memory_distiller

  deploy:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p "${{ secrets.VPS_PORT }}" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "sudo /usr/local/bin/deploy-memory-distiller"

      - name: External auth smoke check
        run: |
          status="$(curl -sS -o /dev/null -w '%{http_code}' https://memory.bitschi.org)"
          if [ "$status" != "401" ]; then
            echo "Expected unauthenticated HTTPS request to return 401, got $status"
            exit 1
          fi
          echo "Unauthenticated HTTPS request returned 401 as expected."
